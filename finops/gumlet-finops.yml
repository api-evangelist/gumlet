description: >-
  FinOps view of Gumlet spend. Gumlet bills a plan subscription (Free, Creator,
  Growth, Business) plus per-minute video usage covering encoding, storage, and
  delivery, with a DRM add-on and image optimization/delivery metered by usage.
  Enterprise agreements offer volume pricing.
notes: >-
  Per-minute and per-GB rates vary by plan and are subject to change; verify
  against the Gumlet pricing page during reconciliation.
sources:
- https://www.gumlet.com/pricing/
- https://docs.gumlet.com/docs/apis
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Gumlet
serviceCategory: Media and Content Delivery
billingModel:
  pricingCategory: Subscription-Plus-Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Gumlet
