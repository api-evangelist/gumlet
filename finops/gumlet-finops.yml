meters:
- name: encoding_minutes
  description: Minutes of video encoded/processed, billed per minute per plan.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - collection
- name: storage_minutes
  description: Minutes of video stored, billed per minute per plan.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - collection
- name: delivery_bandwidth
  description: Bandwidth of video and image delivery served via CDN.
  unit: gigabytes
  aggregation: sum
  dimensions:
  - account
  - region
- name: image_optimizations
  description: Images optimized and delivered from configured image sources.
  unit: images
  aggregation: sum
  dimensions:
  - account
  - source
- name: live_minutes
  description: Minutes of live streaming ingested and delivered.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - collection
- name: subscription_fee
  description: Monthly plan subscription fee (Creator, Growth, Business, DRM add-on).
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Use Gumlet usage analytics to inspect per-minute encoding, storage, and delivery burn.
- name: Allocation
  description: Tag assets by collection/workspace and map to internal cost centers.
- name: Optimization
  description: Enable per-title encoding to cut bitrate/storage, right-size output formats, and choose plan tier to match volume; add DRM only where premium protection is required.
- name: Accountability
  description: Assign owners per workspace; review monthly minute and bandwidth spend against budget.
