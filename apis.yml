aid: gumlet
url: https://raw.githubusercontent.com/api-evangelist/gumlet/refs/heads/main/apis.yml
name: Gumlet
kind: company
description: Gumlet is a video hosting, streaming, and image optimization platform.
  Its video APIs cover on-demand and live streaming, per-title encoding, DRM, subtitles,
  and analytics, while its image APIs provide real-time resize, compression, and CDN
  delivery from cloud storage sources. All surfaces run under a single REST API at
  api.gumlet.com/v1 authenticated with a bearer API key.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Video
- Streaming
- Image Optimization
- CDN
- Encoding
- Analytics
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
